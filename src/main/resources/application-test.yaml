spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

cryptovault:
  jwt:
    secret: test-secret-key-for-testing-minimum-32-chars
    expiration: 86400000

  master:
    seed: "test-master-seed-for-testing-purposes-minimum-32-bytes"
    password: test-password

  encryption:
    password: test-encryption-password

  signing:
    chain.id: 1337
    gas.price: 20000000000
    gas.limit: 6721975

  security:
    max-derivation-attempts: 10