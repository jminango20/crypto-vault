spring:
  application:
    name: CryptoVault

  profiles:
    active: default

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/cryptovault}
    username: ${DATABASE_USER:cryptovault}
    password: ${DATABASE_PASSWORD:cryptovault123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: false

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: on_param

cryptovault:
  version: 1.0.0

  jwt:
    secret: minha-super-chave-secreta-muito-longa-com-no-minimo-32-caracteres-para-hs256
    expiration: 86400000

  security:
    enable-address-validation: true
    max-derivation-attempts: 10

  master:
    seed: ${MASTER_SEED:development-seed-not-for-production}
    password: ${MASTER_PASSWORD:change-me-in-production}

  encryption:
    password: ${ENCRYPTION_PASSWORD:another-secret-password}

  signing:
    chain-id: ${CHAIN_ID:1337}
    gas-price: ${GAS_PRICE:20000000000}
    gas-limit: ${GAS_LIMIT:6721975}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.jminango.cryptovault: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN