spring:
  application:
    name: CryptoVault

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/cryptovault}
    username: ${DATABASE_USER:cryptovault}
    password: ${DATABASE_PASSWORD:cryptovault123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

cryptovault:
  version: 1.0.0

  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_MINIMUM_32_CHARS}
    expiration: ${JWT_EXPIRATION:86400000}

  security:
    enable-address-validation: true
    max-derivation-attempts: 10

  # Master Seed (NUNCA commitar valor real!)
  master:
    #seed: ${MASTER_SEED:CHANGE_ME_IN_PRODUCTION}
    #password: ${MASTER_PASSWORD:CHANGE_ME_IN_PRODUCTION}
    seed: "my-super-secret-master-seed-for-cryptovault-hd-wallets-development-2024"
    password: "my-encryption-password-for-development"

  # Encryption
  encryption:
    password: ${ENCRYPTION_PASSWORD:CHANGE_ME_IN_PRODUCTION}

  # Blockchain Configuration
  blockchain:
    rpc.url: ${BLOCKCHAIN_RPC_URL:http://localhost:8545}
    ws.url: ${BLOCKCHAIN_WS_URL:ws://localhost:8546}
    confirmation.blocks: ${BLOCKCHAIN_CONFIRMATIONS:2}

  # Transaction Signing
  signing:
    chain.id: ${BLOCKCHAIN_CHAIN_ID:1337}
    gas.price: ${GAS_PRICE:0}
    gas.limit: ${GAS_LIMIT:20000000}

# Management & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.jminango.cryptovault: ${LOG_LEVEL:DEBUG}
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.web3j: INFO