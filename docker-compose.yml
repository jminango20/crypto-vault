version: '3.8'

services:
  postgres:
    image: postgres:15.1-alpine
    container_name: cryptovault-postgres
    environment:
      POSTGRES_DB: cryptovault
      POSTGRES_USER: cryptovault
      POSTGRES_PASSWORD: cryptovault123
    ports:
      - "5433:5432"
    volumes:
      - cryptovault_data:/var/lib/postgresql/data
    networks:
      - cryptovault-network

volumes:
  cryptovault_data:

networks:
  cryptovault-network:
    driver: bridge